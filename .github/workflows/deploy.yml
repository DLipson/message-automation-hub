name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build

  deploy:
    needs: verify
    if: vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT != '' && vars.GCP_PROJECT_ID != '' && vars.GCP_ZONE != '' && vars.GCP_INSTANCE != ''
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Deploy through VM startup script
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_ZONE: ${{ vars.GCP_ZONE }}
          GCP_INSTANCE: ${{ vars.GCP_INSTANCE }}
          REPO_URL: https://github.com/${{ github.repository }}.git
          TARGET_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail

          service="message-automation-hub"
          app_dir="/opt/message-automation-hub"
          complete_marker="Resource/deploy startup script complete for ${TARGET_COMMIT}."

          deploy_script="$(mktemp)"
          normal_script="$(mktemp)"

          cat >"$deploy_script" <<REMOTE_SCRIPT
          #!/usr/bin/env bash
          set -euo pipefail
          export HOME=/root

          exec > >(tee -a /var/log/message-hub-resource-deploy.log | logger -t message-hub-resource-deploy -s 2>/dev/console) 2>&1

          service="${service}"
          settings_service="message-hub-settings"
          app_dir="${app_dir}"
          repo_url="${REPO_URL}"
          target_commit="${TARGET_COMMIT}"

          printf '[%s] Starting resource/deploy startup script for %s.\n' "\$(date --iso-8601=seconds)" "\$target_commit"

          if ! swapon --show=NAME | grep -qx '/swapfile'; then
            if [ ! -f /swapfile ]; then
              if ! fallocate -l 1G /swapfile; then
                dd if=/dev/zero of=/swapfile bs=1M count=1024 status=progress
              fi
              chmod 600 /swapfile
              mkswap /swapfile
            fi
            swapon /swapfile
          fi

          grep -qE '^/swapfile[[:space:]]' /etc/fstab || echo '/swapfile none swap sw 0 0' >> /etc/fstab
          printf 'vm.swappiness=10\n' >/etc/sysctl.d/99-message-hub-swap.conf
          sysctl -p /etc/sysctl.d/99-message-hub-swap.conf || true
          swapon --show
          free -h

          systemctl stop "\$settings_service" || true
          systemctl disable "\$settings_service" || true

          systemctl stop "\$service" || true
          mkdir -p "\$app_dir"
          cd "\$app_dir"
          git config --system --add safe.directory "\$app_dir" || true

          if [ ! -d .git ]; then
            git init
            git remote add origin "\$repo_url"
          elif ! git remote get-url origin >/dev/null 2>&1; then
            git remote add origin "\$repo_url"
          else
            git remote set-url origin "\$repo_url"
          fi

          git fetch origin master
          git checkout --force -B master "\$target_commit"
          git reset --hard "\$target_commit"

          npm ci --include=dev --no-audit --no-fund
          npm run build

          if [ -f "deploy/systemd/\${service}.service" ]; then
            cp "deploy/systemd/\${service}.service" "/etc/systemd/system/\${service}.service"
            systemctl daemon-reload
          fi

          rm -f .wwebjs_auth/session/SingletonLock \
            .wwebjs_auth/session/SingletonSocket \
            .wwebjs_auth/session/SingletonCookie

          service_user="\$(systemctl show -p User --value "\${service}.service" 2>/dev/null || true)"
          if [ -z "\$service_user" ]; then
            service_user="\$(stat -c '%U' "\$app_dir" 2>/dev/null || echo root)"
          fi
          if [ "\$service_user" != "root" ]; then
            if ! id -u "\$service_user" >/dev/null 2>&1; then
              useradd --system --create-home --home-dir "/home/\$service_user" --shell /usr/sbin/nologin "\$service_user"
            fi
            chown -R "\${service_user}:\${service_user}" "\$app_dir"
            if [ -d "/home/\$service_user/secrets/message-automation-hub" ]; then
              chown -R "\${service_user}:\${service_user}" "/home/\$service_user/secrets/message-automation-hub"
              chmod 700 "/home/\$service_user/secrets" "/home/\$service_user/secrets/message-automation-hub" || true
            fi
          fi

          systemctl reset-failed "\$service" || true
          systemctl start "\$service"
          systemctl --no-pager --full status "\$service" || true

          printf '[%s] ${complete_marker}\n' "\$(date --iso-8601=seconds)"
          REMOTE_SCRIPT

          cat >"$normal_script" <<'NORMAL_SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          service="message-automation-hub"
          app_dir="/opt/message-automation-hub"

          systemctl stop "$service" || true
          rm -f "$app_dir/.wwebjs_auth/session/SingletonLock" \
            "$app_dir/.wwebjs_auth/session/SingletonSocket" \
            "$app_dir/.wwebjs_auth/session/SingletonCookie"
          systemctl reset-failed "$service" || true
          systemctl start "$service" || true
          NORMAL_SCRIPT

          gcloud compute instances add-metadata "$GCP_INSTANCE" \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_ZONE" \
            --metadata-from-file startup-script="$deploy_script"

          gcloud compute instances reset "$GCP_INSTANCE" \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_ZONE" \
            --quiet

          deadline=$((SECONDS + 1200))
          while [ "$SECONDS" -lt "$deadline" ]; do
            serial_output="$(gcloud compute instances get-serial-port-output "$GCP_INSTANCE" \
              --project "$GCP_PROJECT_ID" \
              --zone "$GCP_ZONE" \
              --port 1 \
              --start 0 || true)"

            if grep -Fq "$complete_marker" <<<"$serial_output"; then
              printf '%s\n' "$serial_output" | tail -n 200
              gcloud compute instances add-metadata "$GCP_INSTANCE" \
                --project "$GCP_PROJECT_ID" \
                --zone "$GCP_ZONE" \
                --metadata-from-file startup-script="$normal_script"
              exit 0
            fi

            sleep 15
          done

          gcloud compute instances get-serial-port-output "$GCP_INSTANCE" \
            --project "$GCP_PROJECT_ID" \
            --zone "$GCP_ZONE" \
            --port 1 \
            --start 0 | tail -n 400
          echo "Timed out waiting for VM startup deploy marker: $complete_marker" >&2
          exit 1
